<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>장호 사진 접수</title>

  <link rel="stylesheet" href="style.css" />

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</head>

<body>
  <div class="app">
    <h1>장호 사진 접수</h1>

    <section class="card camera-card">
      <label class="photo-label">1. 사진 먼저 찍기</label>

      <input
        id="photoInput"
        class="hidden-input"
        type="file"
        accept="image/*"
        capture="environment"
      />

      <button id="photoBtn" class="photo-btn" type="button">
        📷 사진 찍기
      </button>

      <img id="preview" class="preview hidden" alt="사진 미리보기" />
    </section>

    <section id="formCard" class="card form-card disabled">
      <label>2. 성함</label>
      <input id="nameInput" type="text" placeholder="예: 김영자" />

      <label>3. 마을</label>
      <div class="village-grid">
        <button type="button" data-village="장호1리">장호1리</button>
        <button type="button" data-village="장호2리">장호2리</button>
        <button type="button" data-village="용화1리">용화1리</button>
        <button type="button" data-village="용화2리">용화2리</button>
      </div>

      <label>4. 도로명</label>
      <select id="roadSelect">
        <option value="">마을을 먼저 선택하세요</option>
      </select>

      <label>5. 상세주소</label>
      <input id="detailInput" type="text" placeholder="예: 12-3, 101호" />

      <button id="saveBtn" class="save" type="button">저장</button>

      <p id="status"></p>
    </section>

    <section class="card">
      <div class="top-row">
        <h2>저장 목록</h2>
        <button id="csvBtn" type="button">CSV</button>
      </div>

      <input id="searchInput" type="text" placeholder="이름 검색" />

      <div id="list"></div>
    </section>
  </div>
</body>
</html>
