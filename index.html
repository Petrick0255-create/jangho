<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장호 사진 접수</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <h1>장호 사진 접수</h1>

  <section class="card">
    <label>성함</label>
    <input id="nameInput" type="text" placeholder="예: 김영자" />

    <label>마을</label>
    <div class="village-grid">
      <button data-village="장호1리">장호1리</button>
      <button data-village="장호2리">장호2리</button>
      <button data-village="용화1리">용화1리</button>
      <button data-village="용화2리">용화2리</button>
    </div>

    <label>도로명</label>
    <select id="roadSelect">
      <option value="">마을을 먼저 선택하세요</option>
    </select>

    <label>상세주소</label>
    <input id="detailInput" type="text" placeholder="예: 12-3, 101호" />

    <label>사진 촬영</label>
    <input id="photoInput" type="file" accept="image/*" capture="environment" />

    <img id="preview" class="preview hidden" />

    <button id="saveBtn" class="save">저장</button>
  </section>

  <section class="card">
    <div class="top-row">
      <h2>저장 목록</h2>
      <button id="csvBtn">CSV 다운로드</button>
    </div>

    <div id="list"></div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
