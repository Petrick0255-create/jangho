<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>장호 사진 접수</title>

<link rel="stylesheet" href="style.css">

<!-- ExcelJS -->
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<!-- FileSaver -->
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>

</head>

<body>

<div class="container">

<h1>📸 장호 사진 접수</h1>

<div class="card">

<button id="cameraBtn">

📷 사진 찍기

</button>

<input
id="photoInput"
type="file"
accept="image/*"
capture="environment"
hidden>

<img
id="preview"
class="hidden">

</div>

<div class="card">

<label>성함</label>

<input
id="nameInput"
placeholder="성함 입력">

<label>마을</label>

<div class="villages">

<button data-village="장호1리">장호1리</button>

<button data-village="장호2리">장호2리</button>

<button data-village="용화1리">용화1리</button>

<button data-village="용화2리">용화2리</button>

</div>

<label>도로명</label>

<select id="roadSelect">

<option value="">
도로명 선택
</option>

</select>

<label>상세주소</label>

<input
id="detailInput"
placeholder="예) 15-3">

<button id="saveBtn">

저장

</button>

</div>

<div class="card">

<div class="toolbar">

<input
id="searchInput"
placeholder="이름 검색">

<button id="excelBtn">

📄 엑셀 저장

</button>

</div>

<div id="count">

0명 저장됨

</div>

<div id="list">

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
